<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slot Machine - Popup Gamificado</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Poppins', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1a1a2e;
  }

  /* ── OVERLAY ── */
  .popup-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.7);
    backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999;
    animation: fadeIn .4s ease;
  }
  @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }

  /* ── POPUP ── */
  .popup-container {
    position: relative;
    width: 440px; max-width: 95vw;
    max-height: 96vh;
    overflow-y: auto;
    background: linear-gradient(170deg, #1a0a2e 0%, #12072a 50%, #0a0416 100%);
    border-radius: 28px;
    border: 2px solid rgba(255,215,0,.2);
    box-shadow:
      0 0 80px rgba(255,215,0,.1),
      0 0 160px rgba(138,43,226,.08),
      inset 0 1px 0 rgba(255,255,255,.04);
    animation: popIn .5s cubic-bezier(.17,.67,.35,1.2);
  }
  @keyframes popIn {
    from { transform: scale(.85) translateY(20px); opacity: 0 }
    to { transform: scale(1) translateY(0); opacity: 1 }
  }

  .close-btn {
    position: absolute; top: 14px; right: 16px;
    width: 34px; height: 34px;
    background: rgba(255,255,255,.07);
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 50%;
    color: rgba(255,255,255,.45);
    font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s; z-index: 10;
  }
  .close-btn:hover { background: rgba(255,255,255,.15); color: #fff; }

  /* ── HEADER ── */
  .popup-header {
    text-align: center;
    padding: 26px 24px 14px;
  }

  .badge {
    display: inline-block;
    background: linear-gradient(135deg, #ff6b35, #ff2d2d);
    color: #fff;
    font-size: 10px; font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 14px;
    border-radius: 20px;
    margin-bottom: 10px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,45,45,.4) }
    50% { box-shadow: 0 0 0 8px rgba(255,45,45,0) }
  }

  .popup-header h1 {
    font-size: 28px; font-weight: 900;
    background: linear-gradient(135deg, #ffd700, #ffaa00, #ffd700);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.15;
    margin-bottom: 4px;
  }

  .popup-header .subtitle {
    color: rgba(255,255,255,.5);
    font-size: 13px;
    font-weight: 400;
  }

  /* ── FORM AREA ── */
  .form-area {
    padding: 16px 24px 0;
  }

  .form-row {
    display: flex; gap: 10px;
    margin-bottom: 10px;
  }

  .form-field {
    flex: 1;
    position: relative;
  }

  .form-field input {
    width: 100%;
    background: rgba(255,255,255,.07);
    border: 1.5px solid rgba(255,255,255,.12);
    border-radius: 12px;
    padding: 12px 14px 12px 38px;
    color: #fff;
    font-family: 'Poppins', sans-serif;
    font-size: 13px;
    transition: all .25s;
    outline: none;
  }
  .form-field input::placeholder { color: rgba(255,255,255,.25); font-size: 12px; }
  .form-field input:focus {
    border-color: rgba(255,215,0,.5);
    background: rgba(255,255,255,.1);
    box-shadow: 0 0 0 3px rgba(255,215,0,.08);
  }
  .form-field input.error {
    border-color: #ff4444;
    box-shadow: 0 0 0 3px rgba(255,68,68,.1);
  }

  .form-field .field-icon {
    position: absolute;
    left: 12px; top: 50%; transform: translateY(-50%);
    font-size: 14px;
    color: rgba(255,255,255,.3);
    pointer-events: none;
  }

  .error-msg {
    color: #ff6b6b;
    font-size: 10px;
    margin-top: 3px;
    padding-left: 4px;
    display: none;
  }

  /* ── SLOT MACHINE (ALWAYS VISIBLE) ── */
  .slot-wrapper {
    padding: 16px 24px 6px;
    position: relative;
  }

  .lights-row {
    display: flex; justify-content: center;
    gap: 10px; margin-bottom: 12px;
  }
  .light {
    width: 7px; height: 7px;
    border-radius: 50%;
    animation: blink 1s infinite alternate;
  }
  .light:nth-child(odd) { background: #ffd700; animation-delay: 0s; }
  .light:nth-child(even) { background: #ff2d2d; animation-delay: .5s; }
  @keyframes blink {
    from { opacity: .3; box-shadow: none }
    to { opacity: 1; box-shadow: 0 0 8px currentColor }
  }

  .machine-body {
    background: linear-gradient(180deg, #241245 0%, #1a0d38 100%);
    border: 3px solid rgba(255,215,0,.3);
    border-radius: 22px;
    padding: 18px 14px 14px;
    position: relative;
    box-shadow:
      inset 0 3px 12px rgba(0,0,0,.5),
      0 0 40px rgba(138,43,226,.12);
  }

  .machine-body::before {
    content: '';
    position: absolute;
    top: -3px; left: 25%; right: 25%;
    height: 3px;
    background: linear-gradient(90deg, transparent, #ffd700, transparent);
    border-radius: 2px;
  }

  .reels-container {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 10px;
  }

  .reel {
    width: 96px; height: 108px;
    background: linear-gradient(180deg, #0d0618, #150b28, #0d0618);
    border: 2px solid rgba(255,215,0,.18);
    border-radius: 16px;
    overflow: hidden;
    position: relative;
  }
  .reel::before, .reel::after {
    content: '';
    position: absolute; left: 0; right: 0;
    height: 28px; z-index: 2;
    pointer-events: none;
  }
  .reel::before { top: 0; background: linear-gradient(180deg, rgba(13,6,24,.95), transparent); }
  .reel::after  { bottom: 0; background: linear-gradient(0deg, rgba(13,6,24,.95), transparent); }

  .reel-strip {
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: transform .1s linear;
  }

  .reel-item {
    width: 96px; height: 108px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 56px;
    flex-shrink: 0;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,.4));
  }

  .center-line {
    position: absolute;
    left: 12px; right: 12px;
    top: 50%; transform: translateY(-50%);
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(255,215,0,.35), transparent);
    z-index: 3;
    pointer-events: none;
  }

  .attempts-row {
    display: flex; justify-content: center; gap: 8px;
    margin-top: 4px;
  }
  .att-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: rgba(255,255,255,.1);
    border: 1.5px solid rgba(255,255,255,.2);
    transition: all .3s;
  }
  .att-dot.used { background: #ff4444; border-color: #ff4444; }
  .att-dot.won  { background: #00e676; border-color: #00e676; box-shadow: 0 0 10px rgba(0,230,118,.5); }

  /* ── LOCK OVERLAY ── */
  .lock-overlay {
    position: absolute;
    inset: 0;
    background: rgba(10,4,22,.65);
    backdrop-filter: blur(3px);
    border-radius: 22px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 5;
    transition: all .5s ease;
  }
  .lock-overlay.unlocked {
    opacity: 0;
    pointer-events: none;
  }

  .lock-icon {
    font-size: 38px;
    margin-bottom: 6px;
    animation: lockBounce 2s infinite;
  }
  @keyframes lockBounce {
    0%, 100% { transform: translateY(0) }
    50% { transform: translateY(-5px) }
  }

  .lock-text {
    color: rgba(255,255,255,.75);
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* ── RESULT MSG ── */
  .result-msg {
    text-align: center;
    min-height: 22px;
    margin-top: 8px;
    font-size: 13px;
  }
  .result-msg.lose {
    color: #ff6b6b;
    font-weight: 600;
    animation: shake .4s ease;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0) }
    20% { transform: translateX(-6px) }
    40% { transform: translateX(6px) }
    60% { transform: translateX(-4px) }
    80% { transform: translateX(4px) }
  }

  /* ── BOTTOM ACTION ── */
  .bottom-action {
    padding: 12px 24px 22px;
  }

  .btn-main {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 14px;
    font-family: 'Poppins', sans-serif;
    font-size: 15px; font-weight: 800;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    transition: all .3s;
    position: relative;
    overflow: hidden;
  }

  .btn-main.btn-register {
    background: linear-gradient(135deg, #ffd700, #ffaa00);
    color: #1a0a2e;
    box-shadow: 0 4px 24px rgba(255,215,0,.3);
  }
  .btn-main.btn-register:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 32px rgba(255,215,0,.45);
  }

  .btn-main.btn-spin {
    background: linear-gradient(135deg, #ff2d2d, #ff6b35);
    color: #fff;
    box-shadow: 0 4px 24px rgba(255,45,45,.3);
  }
  .btn-main.btn-spin:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 6px 32px rgba(255,45,45,.5);
  }
  .btn-main.btn-spin:disabled {
    opacity: .5;
    cursor: not-allowed;
    transform: none;
  }

  .btn-main::after {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: linear-gradient(transparent, rgba(255,255,255,.12), transparent);
    transform: rotate(45deg);
    animation: btnShine 3s infinite;
  }
  @keyframes btnShine {
    0% { transform: translateX(-100%) rotate(45deg) }
    100% { transform: translateX(100%) rotate(45deg) }
  }

  .spin-info {
    text-align: center;
    color: rgba(255,255,255,.4);
    font-size: 11px;
    margin-top: 8px;
    font-weight: 600;
  }
  .spin-info span { color: #ffd700; }

  .consent-text {
    text-align: center;
    color: rgba(255,255,255,.25);
    font-size: 9px;
    margin-top: 8px;
  }

  .hidden { display: none !important; }

  /* ── WIN OVERLAY ── */
  .win-overlay {
    position: absolute;
    inset: 0;
    background: rgba(10,4,22,.92);
    backdrop-filter: blur(6px);
    border-radius: 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 20;
    padding: 30px;
    animation: fadeIn .4s ease;
  }

  .win-overlay .trophy { font-size: 60px; margin-bottom: 10px; animation: bounce .8s infinite; }
  @keyframes bounce {
    0%, 100% { transform: translateY(0) }
    50% { transform: translateY(-10px) }
  }

  .win-overlay h2 {
    font-size: 28px; font-weight: 900;
    background: linear-gradient(135deg, #00e676, #00c853);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 4px;
  }

  .win-overlay .win-sub {
    color: rgba(255,255,255,.55);
    font-size: 13px;
    margin-bottom: 22px;
  }

  .coupon-box {
    background: linear-gradient(135deg, rgba(255,215,0,.1), rgba(255,170,0,.06));
    border: 2px dashed rgba(255,215,0,.45);
    border-radius: 18px;
    padding: 22px 30px;
    margin-bottom: 22px;
    text-align: center;
    width: 100%;
    max-width: 300px;
    position: relative;
  }
  .coupon-box::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(45deg, transparent 48%, rgba(255,215,0,.04) 50%, transparent 52%);
    background-size: 18px 18px;
    border-radius: 16px;
  }

  .coupon-label {
    font-size: 10px;
    color: rgba(255,255,255,.4);
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: 600;
    margin-bottom: 8px;
    position: relative;
  }

  .coupon-code {
    font-size: 34px; font-weight: 900;
    color: #ffd700;
    letter-spacing: 4px;
    text-shadow: 0 0 25px rgba(255,215,0,.3);
    margin-bottom: 6px;
    position: relative;
  }

  .coupon-desc {
    font-size: 13px;
    color: rgba(255,255,255,.6);
    font-weight: 600;
    position: relative;
  }

  .btn-copy {
    width: 100%; max-width: 300px;
    padding: 14px;
    background: linear-gradient(135deg, #00e676, #00c853);
    border: none;
    border-radius: 14px;
    color: #fff;
    font-family: 'Poppins', sans-serif;
    font-size: 14px; font-weight: 700;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all .3s;
    box-shadow: 0 4px 20px rgba(0,230,118,.3);
  }
  .btn-copy:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 30px rgba(0,230,118,.5);
  }
  .btn-copy.copied {
    background: linear-gradient(135deg, #7c4dff, #651fff);
  }

  /* ── CONFETTI ── */
  .confetti-container {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 10000;
    overflow: hidden;
  }
  .confetti {
    position: absolute;
    width: 10px; height: 10px;
    top: -10px;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1 }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0 }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 460px) {
    .popup-container { border-radius: 20px; }
    .popup-header h1 { font-size: 24px; }
    .form-row { flex-direction: column; gap: 8px; }
    .reel { width: 82px; height: 94px; }
    .reel-item { width: 82px; height: 94px; font-size: 46px; }
    .coupon-code { font-size: 28px; }
  }
</style>
</head>
<body>

<div class="popup-overlay" id="popupOverlay">
  <div class="popup-container" id="popupBox">
    <button class="close-btn" id="closeBtn">&times;</button>

    <!-- ═══ HEADER ═══ -->
    <div class="popup-header">
      <div class="badge">Exclusivo</div>
      <h1>Jogue &amp; Ganhe!</h1>
      <p class="subtitle">Cadastre-se e gire a slot machine para ganhar um desconto!</p>
    </div>

    <!-- ═══ FORM (always visible until registered) ═══ -->
    <div class="form-area" id="formArea">
      <div class="form-row">
        <div class="form-field">
          <span class="field-icon">&#9993;</span>
          <input type="email" id="emailInput" placeholder="Seu e-mail" autocomplete="email">
          <div class="error-msg" id="emailError">E-mail inválido</div>
        </div>
        <div class="form-field">
          <span class="field-icon">&#128241;</span>
          <input type="tel" id="phoneInput" placeholder="(11) 99999-9999" autocomplete="tel">
          <div class="error-msg" id="phoneError">Número inválido</div>
        </div>
      </div>
    </div>

    <!-- ═══ SLOT MACHINE (always visible, locked until registered) ═══ -->
    <div class="slot-wrapper">
      <div class="lights-row">
        <div class="light"></div><div class="light"></div><div class="light"></div>
        <div class="light"></div><div class="light"></div><div class="light"></div>
        <div class="light"></div><div class="light"></div><div class="light"></div>
        <div class="light"></div><div class="light"></div>
      </div>

      <div class="machine-body" id="machineBody">
        <!-- LOCK OVERLAY -->
        <div class="lock-overlay" id="lockOverlay">
          <div class="lock-icon">&#128274;</div>
          <div class="lock-text">Cadastre-se para jogar</div>
        </div>

        <div class="center-line"></div>
        <div class="reels-container">
          <div class="reel"><div class="reel-strip" id="strip1"></div></div>
          <div class="reel"><div class="reel-strip" id="strip2"></div></div>
          <div class="reel"><div class="reel-strip" id="strip3"></div></div>
        </div>

        <div class="attempts-row">
          <div class="att-dot" id="dot1"></div>
          <div class="att-dot" id="dot2"></div>
          <div class="att-dot" id="dot3"></div>
        </div>
      </div>

      <div class="result-msg" id="resultMsg"></div>
    </div>

    <!-- ═══ BOTTOM ACTION BUTTON ═══ -->
    <div class="bottom-action">
      <!-- State 1: Register button -->
      <button class="btn-main btn-register" id="btnRegister">
        Cadastrar &amp; Jogar
      </button>
      <p class="consent-text" id="consentText">Ao continuar, você aceita receber ofertas exclusivas.</p>

      <!-- State 2: Spin button (hidden initially) -->
      <button class="btn-main btn-spin hidden" id="btnSpin">
        Girar!
      </button>
      <div class="spin-info hidden" id="spinInfo">
        Tentativas restantes: <span id="attemptsLeft">3</span>
      </div>
    </div>

  </div>
</div>

<div class="confetti-container" id="confettiContainer"></div>

<script>
(() => {
  // ── ELEMENTS ──
  const formArea     = document.getElementById('formArea');
  const emailInput   = document.getElementById('emailInput');
  const phoneInput   = document.getElementById('phoneInput');
  const emailError   = document.getElementById('emailError');
  const phoneError   = document.getElementById('phoneError');
  const btnRegister  = document.getElementById('btnRegister');
  const btnSpin      = document.getElementById('btnSpin');
  const spinInfo     = document.getElementById('spinInfo');
  const consentText  = document.getElementById('consentText');
  const lockOverlay  = document.getElementById('lockOverlay');
  const resultMsg    = document.getElementById('resultMsg');
  const attemptsEl   = document.getElementById('attemptsLeft');
  const popupBox     = document.getElementById('popupBox');
  const strips = [
    document.getElementById('strip1'),
    document.getElementById('strip2'),
    document.getElementById('strip3')
  ];
  const dots = [
    document.getElementById('dot1'),
    document.getElementById('dot2'),
    document.getElementById('dot3')
  ];

  // ── CONFIG ──
  const ITEMS = ['👟', '👕', '🧢'];
  const LOSE_COMBOS = [
    ['👟', '👕', '🧢'],
    ['🧢', '👟', '👕'],
  ];
  const WIN_COMBO = ['👟', '👟', '👟'];

  let attempts = 0;
  let spinning = false;
  let registered = false;

  // ── INIT REELS (show static items from the start) ──
  function initReels() {
    strips.forEach((strip, i) => {
      strip.innerHTML = '';
      for (let j = 0; j < 20; j++) {
        const div = document.createElement('div');
        div.className = 'reel-item';
        div.textContent = ITEMS[j % ITEMS.length];
        strip.appendChild(div);
      }
      strip.style.transform = 'translateY(0)';
    });
  }
  initReels();

  // ── PHONE MASK ──
  phoneInput.addEventListener('input', (e) => {
    let v = e.target.value.replace(/\D/g, '');
    if (v.length > 11) v = v.slice(0, 11);
    if (v.length > 7) v = `(${v.slice(0,2)}) ${v.slice(2,7)}-${v.slice(7)}`;
    else if (v.length > 2) v = `(${v.slice(0,2)}) ${v.slice(2)}`;
    else if (v.length > 0) v = `(${v}`;
    e.target.value = v;
  });

  // ── VALIDATION ──
  function validateEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  }
  function validatePhone(phone) {
    return phone.replace(/\D/g, '').length >= 10;
  }

  // ── REGISTER ──
  btnRegister.addEventListener('click', () => {
    let valid = true;

    if (!validateEmail(emailInput.value.trim())) {
      emailInput.classList.add('error');
      emailError.style.display = 'block';
      valid = false;
    } else {
      emailInput.classList.remove('error');
      emailError.style.display = 'none';
    }

    if (!validatePhone(phoneInput.value)) {
      phoneInput.classList.add('error');
      phoneError.style.display = 'block';
      valid = false;
    } else {
      phoneInput.classList.remove('error');
      phoneError.style.display = 'none';
    }

    if (!valid) return;

    // Capture lead
    const leadData = {
      email: emailInput.value.trim(),
      phone: phoneInput.value.trim(),
      timestamp: new Date().toISOString()
    };
    console.log('Lead capturado:', leadData);

    // Unlock the machine
    registered = true;
    formArea.classList.add('hidden');
    consentText.classList.add('hidden');
    btnRegister.classList.add('hidden');
    lockOverlay.classList.add('unlocked');
    btnSpin.classList.remove('hidden');
    spinInfo.classList.remove('hidden');

    // Re-init reels fresh
    initReels();
  });

  // ── SPIN ──
  btnSpin.addEventListener('click', () => {
    if (!registered || spinning || attempts >= 3) return;
    spinning = true;
    btnSpin.disabled = true;
    resultMsg.textContent = '';
    resultMsg.className = 'result-msg';

    const isWin = attempts === 2;
    const targetCombo = isWin ? WIN_COMBO : LOSE_COMBOS[attempts];

    const targets = targetCombo.map(symbol => ITEMS.indexOf(symbol));

    const firstItem = strips[0].querySelector('.reel-item');
    const reelHeight = firstItem ? firstItem.offsetHeight : 108;
    const spinDurations = [1600, 2100, 2600];
    const spinCycles = [5, 7, 9];

    strips.forEach((strip, i) => {
      const targetIdx = targets[i];
      const totalItems = spinCycles[i] * ITEMS.length + targetIdx;
      const finalY = -(totalItems * reelHeight);

      strip.style.transition = 'none';
      strip.style.transform = 'translateY(0)';

      strip.innerHTML = '';
      const totalNeeded = totalItems + 5;
      for (let j = 0; j < totalNeeded; j++) {
        const div = document.createElement('div');
        div.className = 'reel-item';
        div.textContent = ITEMS[j % ITEMS.length];
        strip.appendChild(div);
      }

      strip.offsetHeight; // force reflow

      strip.style.transition = `transform ${spinDurations[i]}ms cubic-bezier(.12,.84,.35,1)`;
      strip.style.transform = `translateY(${finalY}px)`;
    });

    const maxDuration = Math.max(...spinDurations);

    setTimeout(() => {
      attempts++;
      dots[attempts - 1].classList.add(isWin ? 'won' : 'used');
      attemptsEl.textContent = 3 - attempts;

      if (isWin) {
        resultMsg.innerHTML = '&#127881; 3 T\u00CANIS! VOC\u00CA GANHOU! &#127881;';
        resultMsg.style.color = '#00e676';
        resultMsg.style.fontSize = '15px';
        resultMsg.style.fontWeight = '800';

        setTimeout(() => showWinScreen(), 1200);
      } else {
        resultMsg.textContent = attempts === 1
          ? 'Quase! Tente novamente...'
          : 'N\u00E3o foi dessa vez... \u00DAltima chance!';
        resultMsg.className = 'result-msg lose';
        spinning = false;
        btnSpin.disabled = false;
      }
    }, maxDuration + 200);
  });

  // ── WIN SCREEN ──
  function showWinScreen() {
    const overlay = document.createElement('div');
    overlay.className = 'win-overlay';
    overlay.innerHTML = `
      <div class="trophy">&#127942;</div>
      <h2>Voc\u00EA Ganhou!</h2>
      <p class="win-sub">Parab\u00E9ns! Aqui est\u00E1 seu cupom exclusivo:</p>
      <div class="coupon-box">
        <div class="coupon-label">Seu Cupom</div>
        <div class="coupon-code" id="couponCode">GANHEI15</div>
        <div class="coupon-desc">15% de desconto em todo o site</div>
      </div>
      <button class="btn-copy" id="btnCopyWin">Copiar Cupom</button>
    `;
    popupBox.appendChild(overlay);
    launchConfetti();

    document.getElementById('btnCopyWin').addEventListener('click', function() {
      const code = document.getElementById('couponCode').textContent;
      navigator.clipboard.writeText(code).then(() => {
        this.textContent = 'Copiado!';
        this.classList.add('copied');
        setTimeout(() => {
          this.textContent = 'Copiar Cupom';
          this.classList.remove('copied');
        }, 2500);
      }).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = code;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        this.textContent = 'Copiado!';
        this.classList.add('copied');
      });
    });
  }

  // ── CONFETTI ──
  function launchConfetti() {
    const container = document.getElementById('confettiContainer');
    const colors = ['#ffd700', '#ff2d2d', '#00e676', '#7c4dff', '#ff6b35', '#00bcd4'];
    for (let i = 0; i < 120; i++) {
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.left = Math.random() * 100 + '%';
      c.style.width = (Math.random() * 8 + 5) + 'px';
      c.style.height = (Math.random() * 8 + 5) + 'px';
      c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
      c.style.borderRadius = Math.random() > .5 ? '50%' : '2px';
      c.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
      c.style.animationDelay = (Math.random() * 1) + 's';
      container.appendChild(c);
    }
    setTimeout(() => { container.innerHTML = ''; }, 4500);
  }

  // ── CLOSE ──
  document.getElementById('closeBtn').addEventListener('click', () => {
    document.getElementById('popupOverlay').style.display = 'none';
  });

})();
</script>
</body>
</html>
